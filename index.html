<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Launcher d'applications</title>
  <style>
    :root {
      --bg: #101214;
      --panel: rgba(20, 23, 27, 0.78);
      --panel-strong: rgba(25, 29, 34, 0.92);
      --text: #f4f0e8;
      --muted: #b8c0c9;
      --line: rgba(255, 255, 255, 0.16);
      --accent: #70d6ff;
      --accent-2: #ffcf5a;
      --danger: #ff7a90;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .stage {
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(120deg, rgba(11, 16, 20, 0.34), rgba(6, 7, 9, 0.82)),
        var(--active-image, linear-gradient(135deg, #1f3b52, #332b46 46%, #483326));
      background-position: center;
      background-size: cover;
      transform: scale(1.04);
      transition: background 360ms ease, filter 360ms ease;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 12%, rgba(112, 214, 255, 0.18), transparent 30%),
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: auto, 42px 42px, 42px 42px;
      pointer-events: none;
    }

    .shell {
      width: min(1440px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px 0;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 340px;
      gap: 16px;
    }

    .sidebar,
    .content,
    .details {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .sidebar,
    .details {
      border-radius: 8px;
      align-self: start;
      position: sticky;
      top: 22px;
      max-height: calc(100vh - 44px);
      overflow: auto;
    }

    .sidebar {
      padding: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, #70d6ff, #ffcf5a);
      color: #111;
      font-weight: 900;
      letter-spacing: 0;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 1.12rem;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.86rem;
      margin-top: 3px;
    }

    .search {
      position: relative;
      margin-bottom: 18px;
    }

    .search input,
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.24);
      color: var(--text);
      outline: none;
    }

    .search input {
      height: 42px;
      padding: 0 12px 0 38px;
    }

    .search svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    .nav-title {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      margin: 18px 0 10px;
    }

    .category-list {
      display: grid;
      gap: 7px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .tag-filter {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 10px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.05);
      cursor: pointer;
    }

    .tag-filter.active,
    .tag-filter:hover {
      color: var(--text);
      border-color: color-mix(in srgb, var(--accent) 70%, white 10%);
      background: rgba(255, 255, 255, 0.12);
    }

    .category-button {
      width: 100%;
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0 11px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--text);
      background: transparent;
      cursor: pointer;
    }

    .category-button:hover,
    .category-button.active {
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.09);
    }

    .category-meta {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .category-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--category-color);
      flex: 0 0 auto;
    }

    .category-count {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .quick-actions {
      display: grid;
      gap: 8px;
      margin-top: 22px;
    }

    .icon-button,
    .primary-button,
    .ghost-button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }

    .primary-button {
      border-color: rgba(112, 214, 255, 0.46);
      background: linear-gradient(135deg, rgba(112, 214, 255, 0.28), rgba(255, 207, 90, 0.18));
      font-weight: 700;
    }

    .ghost-button:hover,
    .icon-button:hover,
    .primary-button:hover {
      background-color: rgba(255, 255, 255, 0.15);
    }

    .content {
      border-radius: 8px;
      padding: 20px;
      min-width: 0;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .toolbar h2 {
      font-size: clamp(1.6rem, 4vw, 3.4rem);
      line-height: 0.95;
      max-width: 760px;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .icon-button {
      width: 40px;
      padding: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }

    .app-card {
      min-height: 320px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      color: var(--text);
      background: var(--panel-strong);
      display: grid;
      grid-template-rows: 154px 1fr;
      cursor: pointer;
      text-align: left;
      padding: 0;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .app-card:hover,
    .app-card.active {
      transform: translateY(-3px);
      border-color: color-mix(in srgb, var(--accent) 70%, white 10%);
      background: rgba(34, 39, 46, 0.94);
    }

    .app-image {
      position: relative;
      background:
        linear-gradient(135deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.42)),
        var(--card-image);
      background-position: center;
      background-size: cover;
    }

    .app-topbar {
      position: absolute;
      inset: 10px 10px auto 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      pointer-events: none;
    }

    .app-icon {
      min-width: 42px;
      height: 42px;
      padding: 0 9px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #101214;
      background: var(--accent-2);
      font-weight: 900;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.32);
    }

    .status-pill {
      min-height: 28px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      padding: 4px 9px;
      color: var(--text);
      background: rgba(0, 0, 0, 0.54);
      font-size: 0.74rem;
      backdrop-filter: blur(14px);
    }

    .status-pill.online {
      color: #bbf7d0;
      border-color: rgba(74, 222, 128, 0.46);
    }

    .status-pill.offline {
      color: #fecdd3;
      border-color: rgba(251, 113, 133, 0.48);
    }

    .card-actions {
      position: absolute;
      right: 10px;
      bottom: 10px;
      display: flex;
      gap: 6px;
    }

    .mini-action {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      color: var(--text);
      background: rgba(0, 0, 0, 0.54);
      display: grid;
      place-items: center;
      cursor: pointer;
      backdrop-filter: blur(14px);
    }

    .mini-action.active {
      color: #111;
      background: var(--accent-2);
    }

    .app-body {
      padding: 14px;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .tag {
      width: fit-content;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 9px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.05);
      font-size: 0.77rem;
      overflow-wrap: anywhere;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pitch {
      color: var(--text);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .app-card h3 {
      font-size: 1.08rem;
      line-height: 1.15;
    }

    .app-card p {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .details {
      padding: 18px;
    }

    .hero-preview {
      aspect-ratio: 16 / 10;
      border-radius: 8px;
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(0, 0, 0, 0.06), rgba(0, 0, 0, 0.42)),
        var(--detail-image);
      background-position: center;
      background-size: cover;
      margin-bottom: 14px;
    }

    .details h2 {
      font-size: 1.45rem;
      margin-bottom: 8px;
    }

    .details p {
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 14px;
    }

    .meta-list {
      display: grid;
      gap: 9px;
      margin: 16px 0;
    }

    .meta-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
      padding-bottom: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .meta-item strong {
      color: var(--text);
      font-weight: 600;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .details-actions {
      display: grid;
      grid-template-columns: 1fr 44px 44px 44px;
      gap: 8px;
    }

    .showcase {
      width: min(1040px, calc(100% - 24px));
    }

    .showcase-body {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(260px, 0.65fr);
      gap: 18px;
      padding: 16px;
    }

    .showcase-image {
      min-height: 420px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.28)),
        var(--showcase-image);
      background-position: center;
      background-size: cover;
    }

    .showcase-copy {
      align-self: center;
      display: grid;
      gap: 14px;
    }

    .admin-only {
      display: none;
    }

    body.admin-mode .admin-only {
      display: inline-flex;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 36px;
      color: var(--muted);
      text-align: center;
    }

    dialog {
      width: min(620px, calc(100% - 24px));
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: #171b20;
      box-shadow: var(--shadow);
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(6px);
    }

    .modal-head,
    .modal-foot {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
    }

    .modal-foot {
      border-top: 1px solid var(--line);
      border-bottom: 0;
      justify-content: flex-end;
    }

    .form {
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.wide {
      grid-column: 1 / -1;
    }

    .field label {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .field input,
    .field select {
      height: 40px;
      padding: 0 10px;
    }

    .field textarea {
      min-height: 92px;
      resize: vertical;
      padding: 10px;
    }

    @media (max-width: 1120px) {
      .shell {
        grid-template-columns: 240px minmax(0, 1fr);
      }

      .details {
        grid-column: 1 / -1;
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 760px) {
      .shell {
        width: min(100% - 20px, 720px);
        grid-template-columns: 1fr;
        padding: 10px 0;
      }

      .sidebar {
        position: static;
        max-height: none;
      }

      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar-actions {
        width: 100%;
      }

      .toolbar-actions .ghost-button {
        flex: 1;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .form {
        grid-template-columns: 1fr;
      }

      .showcase-body {
        grid-template-columns: 1fr;
      }

      .showcase-image {
        min-height: 260px;
      }
    }
  </style>
</head>
<body>
  <div class="stage" id="stage"></div>

  <main class="shell">
    <aside class="sidebar" aria-label="Navigation du launcher">
      <div class="brand">
        <div class="brand-mark">L</div>
        <div>
          <h1>Mon Launcher</h1>
          <p class="subtitle">Applications, jeux et outils</p>
        </div>
      </div>

      <label class="search" aria-label="Rechercher une application">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="m21 21-4.35-4.35m1.35-5.15a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="searchInput" type="search" placeholder="Rechercher">
      </label>

      <div class="nav-title">Types</div>
      <nav class="category-list" id="categoryList"></nav>

      <div class="nav-title">Tags</div>
      <div class="tag-list" id="tagList"></div>

      <div class="quick-actions">
        <button class="primary-button" id="addButton" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Ajouter une appli
        </button>
        <button class="ghost-button" id="adminButton" type="button">Mode admin</button>
        <button class="ghost-button" id="resetButton" type="button">Réinitialiser les exemples</button>
      </div>
    </aside>

    <section class="content" aria-live="polite">
      <div class="toolbar">
        <div>
          <p class="subtitle" id="resultCount"></p>
          <h2 id="viewTitle">Toutes tes applications</h2>
        </div>
        <div class="toolbar-actions">
          <button class="icon-button" id="sortButton" type="button" title="Trier par nom" aria-label="Trier par nom">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 7h12M4 12h9M4 17h15M18 5v14m0 0 3-3m-3 3-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="ghost-button" id="randomButton" type="button">Ambiance au hasard</button>
          <button class="ghost-button" id="showcaseButton" type="button">Mode vitrine</button>
        </div>
      </div>
      <div class="grid" id="appGrid"></div>
    </section>

    <aside class="details" id="details" aria-label="Détails de l'application"></aside>
  </main>

  <dialog id="appDialog">
    <form method="dialog" id="appForm">
      <div class="modal-head">
        <h2>Ajouter une application</h2>
        <button class="icon-button" value="cancel" type="submit" aria-label="Fermer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="form">
        <div class="field">
          <label for="nameField">Nom</label>
          <input id="nameField" name="name" required>
        </div>
        <div class="field">
          <label for="categoryField">Type</label>
          <select id="categoryField" name="category">
            <option>Jeux</option>
            <option>Applications</option>
            <option>Simulation</option>
            <option>Création</option>
            <option>Travail</option>
            <option>Autre</option>
          </select>
        </div>
        <div class="field wide">
          <label for="descriptionField">Description</label>
          <textarea id="descriptionField" name="description" required></textarea>
        </div>
        <div class="field wide">
          <label for="pitchField">Phrase vitrine</label>
          <input id="pitchField" name="pitch" placeholder="Une phrase courte qui donne envie de lancer l'app">
        </div>
        <div class="field wide">
          <label for="linkField">Lien d'ouverture</label>
          <input id="linkField" name="link" placeholder="https://..., steam://..., file:///C:/...">
        </div>
        <div class="field wide">
          <label for="imageField">Image de fond</label>
          <input id="imageField" name="image" placeholder="https://... ou chemin local utilisable par le navigateur">
        </div>
        <div class="field">
          <label for="iconField">Icône</label>
          <input id="iconField" name="icon" placeholder="NQ, MB, OS...">
        </div>
        <div class="field">
          <label for="tagsField">Tags</label>
          <input id="tagsField" name="tags" placeholder="RPG, prototype, gestion">
        </div>
        <div class="field">
          <label for="accentField">Couleur principale</label>
          <input id="accentField" name="accent" type="color" value="#70d6ff">
        </div>
        <div class="field">
          <label for="statusField">Statut</label>
          <input id="statusField" name="status" placeholder="Installé, cloud, favori...">
        </div>
      </div>
      <div class="modal-foot">
        <button class="ghost-button" value="cancel" type="submit">Annuler</button>
        <button class="primary-button" value="default" type="submit">Ajouter</button>
      </div>
    </form>
  </dialog>

  <dialog class="showcase" id="showcaseDialog">
    <div class="modal-head">
      <h2 id="showcaseTitle">Mode vitrine</h2>
      <button class="icon-button" id="closeShowcaseButton" type="button" aria-label="Fermer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="showcase-body" id="showcaseBody"></div>
  </dialog>

  <script>
    const starterApps = [
      {
        id: "adhd-rpg",
        name: "ADHD RPG",
        category: "Applications",
        description: "Un RPG d'organisation qui transforme les taches, routines et moments de focus en progression lisible.",
        pitch: "NeuroQuest donne une forme ludique aux journees difficiles sans perdre le cote utile.",
        tags: ["RPG", "Productivite", "Focus", "Prototype"],
        icon: "NQ",
        link: "https://adhd-rpg.vercel.app",
        status: "Vercel",
        accent: "#75d66f",
        image: "assets/previews/adhd-rpg.png"
      },
      {
        id: "multiverse-breach",
        name: "Multiverse Breach",
        category: "Jeux",
        description: "Une experience de faille dimensionnelle qui installe vite une tension de science-fiction.",
        pitch: "Un portail, une anomalie, et l'envie de comprendre ce qui traverse.",
        tags: ["Jeu", "Sci-fi", "Multivers", "Narratif"],
        icon: "MB",
        link: "https://multiverse-breach.vercel.app",
        status: "Vercel",
        accent: "#9b7cff",
        image: "assets/previews/multiverse-breach.png"
      },
      {
        id: "cainos",
        name: "CainOS",
        category: "Simulation",
        description: "Un terminal narratif sombre, pense comme une console d'acces a un systeme qui sait trop de choses.",
        pitch: "Un mainframe de lore a explorer comme une piece fermee dont chaque commande ouvre une porte.",
        tags: ["Terminal", "Lore", "Simulation", "Horreur"],
        icon: "CO",
        link: "https://cainos.vercel.app",
        status: "Vercel",
        accent: "#56f09c",
        image: "assets/previews/cainos.png"
      },
      {
        id: "la-petite-fiole",
        name: "La Petite Fiole",
        category: "Jeux",
        description: "Un atelier d'apothicaire jouable, entre commandes, missions, ingredients et reputation de sorcier.",
        pitch: "Un chaudron, un registre scelle, et une boutique qui sent deja l'aventure magique.",
        tags: ["Gestion", "Magie", "Atelier", "Narratif"],
        icon: "PF",
        link: "https://la-petite-fiole.vercel.app",
        status: "Vercel",
        accent: "#c084fc",

      {

        status: "Vercel",
        accent: "#22d3ee",
        image: "assets/previews/manga-finder.png"
      },
      {
        id: "budgetia",
        name: "Budgetia",

        description: "Un tableau de bord financier local pour suivre depenses, projets, objectifs et enveloppes d'epargne.",
        pitch: "Un budget lisible, des projets visibles, et moins de brouillard entre les chiffres.",
        tags: ["Budget", "Finance", "Objectifs", "Outil"],
        icon: "BU",
        link: "https://budgetia.vercel.app",
        status: "Vercel",
        accent: "#34d399",
        image: "assets/previews/budgetia.png"
      },
      {
        id: "xenomorph-tamagotchi",
        name: "Xenomorph Tamagotchi",
        category: "Jeux",
        description: "Un portail Weyland-Yutani pour gerer un specimen, choisir un profil corporate et survivre aux consequences.",
        pitch: "Un compagnon de laboratoire qui a besoin d'attention, de protocole et d'un plan d'urgence.",
        tags: ["Sci-fi", "Tamagotchi", "Gestion", "Horreur"],
        icon: "XT",
        link: "https://xenomorph-tamagotchi.vercel.app",
        status: "Vercel",
        accent: "#9ca3af",
        image: "assets/previews/xenomorph-tamagotchi.png"
      },
      {
        id: "jigsaw-mastermind",
        name: "Jigsaw Mastermind",
        category: "Jeux",
        description: "Un jeu mental autour des choix, des pieges et de la lecture froide d'une interface hostile.",
        pitch: "Une table de puzzle sombre ou chaque decision ressemble a une confession.",
        tags: ["Puzzle", "Strategie", "Sombre", "Jeu"],
        icon: "JM",
        link: "https://jigsaw-mastermind.vercel.app",
        status: "Vercel",
        accent: "#ef4444",
        image: "assets/previews/jigsaw-mastermind.png"
      },
      {
        id: "apertire-enrichment-os",
        name: "Apertire Enrichment OS",
        category: "Simulation",
        description: "Un faux systeme d'enrichissement scientifique, entre laboratoire froid et humour de test.",
        pitch: "Une interface propre, clinique, presque trop calme pour etre rassurante.",
        tags: ["Laboratoire", "Sci-fi", "Simulation", "Interface"],
        icon: "AE",
        link: "https://apertire-enrichment-os.vercel.app",
        status: "Vercel",
        accent: "#ff9f43",
        image: "assets/previews/apertire-enrichment-os.png"
      },
      {
        id: "hellbound-hotel-manager",
        name: "Hellbound Hotel Manager",
        category: "Jeux",
        description: "Un jeu de gestion d'hotel infernal ou l'accueil client devient une affaire de survie.",
        pitch: "Check-in, contrats douteux, chambres impossibles : la gestion descend d'un etage.",
        tags: ["Gestion", "Horreur", "Hotel", "Jeu"],
        icon: "HH",
        link: "https://hellbound-hotel-manager.vercel.app",
        status: "Vercel",
        accent: "#ff5d73",
        image: "assets/previews/hellbound-hotel-manager.png"
      },
      {
        id: "combine-administrator-simulator",
        name: "Combine Administrator Simulator",
        category: "Simulation",
        description: "Une console d'administration dystopique pour prendre des decisions froides dans un monde sous controle.",
        pitch: "Un tableau de bord autoritaire ou chaque bouton a l'air officiel et moralement suspect.",
        tags: ["Dystopie", "Administration", "Simulation", "Decision"],
        icon: "CA",
        link: "https://combine-administrator-simulator.vercel.app",
        status: "Vercel",
        accent: "#70d6ff",
        image: "assets/previews/combine-administrator-simulator.png"
      }
    ];

    const categoryColors = {
      "Tous": "#70d6ff",
      "Favoris": "#ffcf5a",
      "Jeux": "#ff6b6b",
      "Applications": "#70d6ff",
      "Création": "#ffcf5a",
      "Simulation": "#9b7cff",
      "Travail": "#8be28b",
      "Autre": "#d0a2ff"
    };

    const storeKey = "personal-launcher-apps-v4";
    const favoriteKey = "personal-launcher-favorites-v1";
    const stage = document.getElementById("stage");
    const grid = document.getElementById("appGrid");
    const details = document.getElementById("details");
    const categoryList = document.getElementById("categoryList");
    const tagList = document.getElementById("tagList");
    const resultCount = document.getElementById("resultCount");
    const viewTitle = document.getElementById("viewTitle");
    const searchInput = document.getElementById("searchInput");
    const appDialog = document.getElementById("appDialog");
    const appForm = document.getElementById("appForm");
    const showcaseDialog = document.getElementById("showcaseDialog");
    const showcaseBody = document.getElementById("showcaseBody");
    const showcaseTitle = document.getElementById("showcaseTitle");

    let apps = loadApps();
    let favorites = loadFavorites();
    let onlineStatus = {};
    let activeCategory = "Tous";
    let activeTag = "Tous";
    let selectedId = apps[0]?.id;
    let sortAscending = true;
    let adminMode = false;
    let editingId = null;

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function normalizeApp(app) {
      const fallback = starterApps.find((item) => item.id === app.id) || {};
      const tags = Array.isArray(app.tags) ? app.tags : String(app.tags || "").split(",").map((tag) => tag.trim()).filter(Boolean);
      return {
        ...fallback,
        ...app,
        tags,
        icon: app.icon || fallback.icon || initials(app.name || fallback.name || "APP"),
        pitch: app.pitch || fallback.pitch || app.description || fallback.description || ""
      };
    }

    function loadApps() {
      const saved = localStorage.getItem(storeKey);
      return saved ? JSON.parse(saved).map(normalizeApp) : starterApps.map(normalizeApp);
    }

    function loadFavorites() {
      const saved = localStorage.getItem(favoriteKey);
      return new Set(saved ? JSON.parse(saved) : []);
    }

    function saveApps() {
      localStorage.setItem(storeKey, JSON.stringify(apps));
    }

    function saveFavorites() {
      localStorage.setItem(favoriteKey, JSON.stringify([...favorites]));
    }

    function initials(name) {
      return String(name)
        .split(/\s+/)
        .slice(0, 2)
        .map((word) => word[0]?.toUpperCase() || "")
        .join("") || "AP";
    }

    function cssImage(app) {
      if (app.image) {
        return `url("${app.image}")`;
      }

      return `linear-gradient(135deg, ${app.accent || "#70d6ff"}, #232a31 52%, #101214)`;
    }

    function statusLabel(app) {
      const state = onlineStatus[app.id] || "checking";
      if (state === "online") return "En ligne";
      if (state === "offline") return "Hors ligne";
      return "Test...";
    }

    function allTags() {
      return [...new Set(apps.flatMap((app) => app.tags || []))].sort((a, b) => a.localeCompare(b));
    }

    function filteredApps() {
      const query = searchInput.value.trim().toLowerCase();
      return apps
        .filter((app) => activeCategory === "Tous" || (activeCategory === "Favoris" ? favorites.has(app.id) : app.category === activeCategory))
        .filter((app) => activeTag === "Tous" || (app.tags || []).includes(activeTag))
        .filter((app) => {
          const haystack = `${app.name} ${app.category} ${app.description} ${app.pitch} ${app.status} ${(app.tags || []).join(" ")}`.toLowerCase();
          return haystack.includes(query);
        })
        .sort((a, b) => {
          const favDelta = Number(favorites.has(b.id)) - Number(favorites.has(a.id));
          if (favDelta) return favDelta;
          return sortAscending ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
        });
    }

    function renderCategories() {
      const counts = apps.reduce((acc, app) => {
        acc[app.category] = (acc[app.category] || 0) + 1;
        return acc;
      }, { Tous: apps.length, Favoris: favorites.size });

      const categories = ["Tous", "Favoris", ...Object.keys(counts).filter((item) => !["Tous", "Favoris"].includes(item)).sort()];
      categoryList.innerHTML = categories.map((category) => `
        <button class="category-button ${category === activeCategory ? "active" : ""}" type="button" data-category="${escapeHtml(category)}" style="--category-color: ${categoryColors[category] || categoryColors.Autre}">
          <span class="category-meta">
            <span class="category-dot"></span>
            <span>${escapeHtml(category)}</span>
          </span>
          <span class="category-count">${counts[category] || 0}</span>
        </button>
      `).join("");
    }

    function renderTags() {
      const tags = ["Tous", ...allTags()];
      tagList.innerHTML = tags.map((tag) => `
        <button class="tag-filter ${tag === activeTag ? "active" : ""}" type="button" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</button>
      `).join("");
    }

    function renderGrid() {
      const visibleApps = filteredApps();
      resultCount.textContent = `${visibleApps.length} application${visibleApps.length > 1 ? "s" : ""}`;
      viewTitle.textContent = activeCategory === "Tous" ? "Toutes tes applications" : activeCategory;

      if (!visibleApps.length) {
        grid.innerHTML = `<div class="empty">Aucune application ne correspond à cette recherche.</div>`;
        renderDetails(null);
        return;
      }

      if (!visibleApps.some((app) => app.id === selectedId)) {
        selectedId = visibleApps[0].id;
      }

      grid.innerHTML = visibleApps.map((app) => `
        <article class="app-card ${app.id === selectedId ? "active" : ""}" role="button" tabindex="0" data-id="${escapeHtml(app.id)}" style="--accent: ${app.accent}; --accent-2: ${app.accent}; --card-image: ${cssImage(app)}">
          <div class="app-image">
            <div class="app-topbar">
              <span class="app-icon">${escapeHtml(app.icon)}</span>
              <span class="status-pill ${onlineStatus[app.id] || "checking"}">${statusLabel(app)}</span>
            </div>
            <div class="card-actions">
              <button class="mini-action favorite-button ${favorites.has(app.id) ? "active" : ""}" type="button" data-action="favorite" data-id="${escapeHtml(app.id)}" title="Favori" aria-label="Favori">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="${favorites.has(app.id) ? "currentColor" : "none"}" aria-hidden="true">
                  <path d="m12 3 2.9 5.88 6.49.94-4.7 4.58 1.11 6.46L12 17.81l-5.8 3.05 1.11-6.46-4.7-4.58 6.49-.94L12 3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                </svg>
              </button>
              <button class="mini-action admin-only" type="button" data-action="edit" data-id="${escapeHtml(app.id)}" title="Modifier" aria-label="Modifier">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M4 20h4L18.5 9.5a2.12 2.12 0 0 0-3-3L5 17v3Zm12-15 3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="app-body">
            <div class="tag-row">
              <span class="tag">${escapeHtml(app.category)}</span>
              ${(app.tags || []).slice(0, 2).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
            </div>
            <h3>${escapeHtml(app.name)}</h3>
            <p class="pitch">${escapeHtml(app.pitch)}</p>
            <p>${escapeHtml(app.description)}</p>
          </div>
        </article>
      `).join("");

      renderDetails(apps.find((app) => app.id === selectedId));
    }

    function renderDetails(app) {
      if (!app) {
        details.innerHTML = `<div class="empty">Sélectionne ou ajoute une application.</div>`;
        return;
      }

      document.documentElement.style.setProperty("--active-image", cssImage(app));
      document.documentElement.style.setProperty("--accent", app.accent || "#70d6ff");
      details.style.setProperty("--detail-image", cssImage(app));

      details.innerHTML = `
        <div class="hero-preview"></div>
        <div class="tag-row">
          <span class="tag">${escapeHtml(app.category)}</span>
          ${(app.tags || []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
        </div>
        <h2>${escapeHtml(app.name)}</h2>
        <p class="pitch">${escapeHtml(app.pitch)}</p>
        <p>${escapeHtml(app.description)}</p>
        <div class="meta-list">
          <div class="meta-item"><span>Statut</span><strong>${statusLabel(app)}</strong></div>
          <div class="meta-item"><span>Plateforme</span><strong>${escapeHtml(app.status || "Non renseigné")}</strong></div>
          <div class="meta-item"><span>Lien</span><strong>${escapeHtml(app.link || "A configurer")}</strong></div>
        </div>
        <div class="details-actions">
          <a class="primary-button" href="${escapeHtml(app.link || "#")}" ${app.link ? "target='_blank' rel='noreferrer'" : "aria-disabled='true'"}>Ouvrir</a>
          <button class="icon-button" type="button" id="detailFavoriteButton" title="Favori" aria-label="Favori">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="${favorites.has(app.id) ? "currentColor" : "none"}" aria-hidden="true">
              <path d="m12 3 2.9 5.88 6.49.94-4.7 4.58 1.11 6.46L12 17.81l-5.8 3.05 1.11-6.46-4.7-4.58 6.49-.94L12 3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="icon-button admin-only" type="button" id="editButton" title="Modifier" aria-label="Modifier">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 20h4L18.5 9.5a2.12 2.12 0 0 0-3-3L5 17v3Zm12-15 3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="icon-button admin-only" type="button" id="deleteButton" title="Supprimer" aria-label="Supprimer">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 7h16M10 11v6M14 11v6M6 7l1 14h10l1-14M9 7V4h6v3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      `;
    }

    function renderShowcase(app = apps.find((item) => item.id === selectedId)) {
      if (!app) return;
      showcaseTitle.textContent = app.name;
      showcaseBody.style.setProperty("--showcase-image", cssImage(app));
      showcaseBody.innerHTML = `
        <div class="showcase-image"></div>
        <div class="showcase-copy">
          <div class="app-icon">${escapeHtml(app.icon)}</div>
          <div class="tag-row">
            <span class="tag">${escapeHtml(app.category)}</span>
            ${(app.tags || []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
          </div>
          <h2>${escapeHtml(app.name)}</h2>
          <p class="pitch">${escapeHtml(app.pitch)}</p>
          <p>${escapeHtml(app.description)}</p>
          <a class="primary-button" href="${escapeHtml(app.link)}" target="_blank" rel="noreferrer">Ouvrir</a>
        </div>
      `;
      showcaseDialog.showModal();
    }

    function openEditor(app = null) {
      editingId = app?.id || null;
      appForm.reset();
      document.querySelector("#appDialog .modal-head h2").textContent = app ? "Modifier une application" : "Ajouter une application";
      document.getElementById("nameField").value = app?.name || "";
      document.getElementById("categoryField").value = app?.category || "Autre";
      document.getElementById("descriptionField").value = app?.description || "";
      document.getElementById("pitchField").value = app?.pitch || "";
      document.getElementById("linkField").value = app?.link || "";
      document.getElementById("imageField").value = app?.image || "";
      document.getElementById("iconField").value = app?.icon || "";
      document.getElementById("tagsField").value = (app?.tags || []).join(", ");
      document.getElementById("accentField").value = app?.accent || "#70d6ff";
      document.getElementById("statusField").value = app?.status || "";
      appDialog.showModal();
    }

    function toggleFavorite(id) {
      if (favorites.has(id)) {
        favorites.delete(id);
      } else {
        favorites.add(id);
      }
      saveFavorites();
      render();
    }

    function render() {
      document.body.classList.toggle("admin-mode", adminMode);
      renderCategories();
      renderTags();
      renderGrid();
    }

    async function checkOnlineStatus() {
      await Promise.all(apps.filter((app) => app.link?.startsWith("https://")).map(async (app) => {
        onlineStatus[app.id] = "checking";
        try {
          await fetch(app.link, { mode: "no-cors", cache: "no-store" });
          onlineStatus[app.id] = "online";
        } catch (error) {
          onlineStatus[app.id] = "offline";
        }
        renderGrid();
      }));
    }

    categoryList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-category]");
      if (!button) return;
      activeCategory = button.dataset.category;
      render();
    });

    tagList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-tag]");
      if (!button) return;
      activeTag = button.dataset.tag;
      render();
    });

    grid.addEventListener("mouseover", (event) => {
      const card = event.target.closest("[data-id]");
      if (!card) return;
      const app = apps.find((item) => item.id === card.dataset.id);
      if (app) {
        document.documentElement.style.setProperty("--active-image", cssImage(app));
      }
    });

    grid.addEventListener("click", (event) => {
      const actionButton = event.target.closest("[data-action]");
      if (actionButton) {
        event.stopPropagation();
        const app = apps.find((item) => item.id === actionButton.dataset.id);
        if (!app) return;
        if (actionButton.dataset.action === "favorite") toggleFavorite(app.id);
        if (actionButton.dataset.action === "edit") openEditor(app);
        return;
      }

      const card = event.target.closest("[data-id]");
      if (!card) return;
      selectedId = card.dataset.id;
      renderGrid();
    });

    details.addEventListener("click", (event) => {
      const selectedApp = apps.find((app) => app.id === selectedId);
      if (event.target.closest("#detailFavoriteButton") && selectedApp) {
        toggleFavorite(selectedApp.id);
        return;
      }
      if (event.target.closest("#editButton") && selectedApp) {
        openEditor(selectedApp);
        return;
      }
      const deleteButton = event.target.closest("#deleteButton");
      if (!deleteButton || !selectedId) return;
      apps = apps.filter((app) => app.id !== selectedId);
      favorites.delete(selectedId);
      selectedId = apps[0]?.id;
      saveApps();
      saveFavorites();
      render();
    });

    searchInput.addEventListener("input", renderGrid);

    document.getElementById("sortButton").addEventListener("click", () => {
      sortAscending = !sortAscending;
      renderGrid();
    });

    document.getElementById("randomButton").addEventListener("click", () => {
      const visibleApps = filteredApps();
      const randomApp = visibleApps[Math.floor(Math.random() * visibleApps.length)];
      if (!randomApp) return;
      selectedId = randomApp.id;
      renderGrid();
    });

    document.getElementById("showcaseButton").addEventListener("click", () => renderShowcase());
    document.getElementById("closeShowcaseButton").addEventListener("click", () => showcaseDialog.close());

    document.getElementById("addButton").addEventListener("click", () => openEditor());

    document.getElementById("adminButton").addEventListener("click", (event) => {
      adminMode = !adminMode;
      event.currentTarget.textContent = adminMode ? "Quitter admin" : "Mode admin";
      render();
    });

    document.getElementById("resetButton").addEventListener("click", () => {
      apps = starterApps.map(normalizeApp);
      selectedId = apps[0]?.id;
      activeCategory = "Tous";
      activeTag = "Tous";
      saveApps();
      render();
      checkOnlineStatus();
    });

    appForm.addEventListener("submit", (event) => {
      if (event.submitter?.value === "cancel") return;
      event.preventDefault();
      const formData = new FormData(appForm);
      const name = String(formData.get("name")).trim();
      const app = normalizeApp({
        id: editingId || `${Date.now()}-${name.toLowerCase().replace(/[^a-z0-9]+/g, "-")}`,
        name,
        category: String(formData.get("category")).trim() || "Autre",
        description: String(formData.get("description")).trim(),
        pitch: String(formData.get("pitch")).trim(),
        link: String(formData.get("link")).trim(),
        image: String(formData.get("image")).trim(),
        icon: String(formData.get("icon")).trim(),
        tags: String(formData.get("tags")).split(",").map((tag) => tag.trim()).filter(Boolean),
        accent: String(formData.get("accent")).trim() || "#70d6ff",
        status: String(formData.get("status")).trim()
      });

      apps = editingId ? apps.map((item) => item.id === editingId ? app : item) : [app, ...apps];
      selectedId = app.id;
      activeCategory = "Tous";
      activeTag = "Tous";
      editingId = null;
      saveApps();
      appDialog.close();
      render();
      checkOnlineStatus();
    });

    render();
    checkOnlineStatus();
  </script>
</body>
</html>
