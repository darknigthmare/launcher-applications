<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Un launcher personnel pour retrouver rapidement mes applications, jeux et outils publiés sur Vercel.">
  <meta name="theme-color" content="#101214">
  <meta property="og:title" content="Mon Launcher">
  <meta property="og:description" content="Applications, jeux et outils réunis dans un seul catalogue.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://launcher-applications.vercel.app/">
  <link rel="canonical" href="https://launcher-applications.vercel.app/">
  <link rel="icon" href="assets/launcher-icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="assets/social-features.css">
  <title>Mon Launcher — Applications, jeux et outils</title>
  <style>
    :root {
      --bg: #101214;
      --panel: rgba(20, 23, 27, 0.78);
      --panel-strong: rgba(25, 29, 34, 0.92);
      --text: #f4f0e8;
      --muted: #b8c0c9;
      --line: rgba(255, 255, 255, 0.16);
      --accent: #70d6ff;
      --accent-2: #ffcf5a;
      --danger: #ff7a90;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    :where(button, a, input, select, textarea):focus-visible {
      outline: 3px solid color-mix(in srgb, var(--accent) 78%, white 22%);
      outline-offset: 3px;
    }

    .stage {
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(120deg, rgba(11, 16, 20, 0.34), rgba(6, 7, 9, 0.82)),
        var(--active-image, linear-gradient(135deg, #1f3b52, #332b46 46%, #483326));
      background-position: center;
      background-size: cover;
      transform: scale(1.04);
      transition: background 360ms ease, filter 360ms ease;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 12%, rgba(112, 214, 255, 0.18), transparent 30%),
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: auto, 42px 42px, 42px 42px;
      pointer-events: none;
    }

    .shell {
      width: min(1440px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px 0;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 340px;
      gap: 16px;
    }

    .sidebar,
    .content,
    .details {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .sidebar,
    .details {
      border-radius: 8px;
      align-self: start;
      position: sticky;
      top: 22px;
      max-height: calc(100vh - 44px);
      overflow: auto;
    }

    .sidebar {
      padding: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, #70d6ff, #ffcf5a);
      color: #111;
      font-weight: 900;
      letter-spacing: 0;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 1.12rem;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.86rem;
      margin-top: 3px;
    }

    .search {
      position: relative;
      margin-bottom: 18px;
    }

    .search input,
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.24);
      color: var(--text);
    }

    .search input {
      height: 42px;
      padding: 0 12px 0 38px;
    }

    .search svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    .nav-title {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      margin: 18px 0 10px;
    }

    .category-list {
      display: grid;
      gap: 7px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .tag-filter {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 10px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.05);
      cursor: pointer;
    }

    .tag-filter.active,
    .tag-filter:hover {
      color: var(--text);
      border-color: color-mix(in srgb, var(--accent) 70%, white 10%);
      background: rgba(255, 255, 255, 0.12);
    }

    .category-button {
      width: 100%;
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0 11px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--text);
      background: transparent;
      cursor: pointer;
    }

    .category-button:hover,
    .category-button.active {
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.09);
    }

    .category-meta {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .category-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--category-color);
      flex: 0 0 auto;
    }

    .category-count {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .quick-actions {
      display: grid;
      gap: 8px;
      margin-top: 22px;
    }

    .icon-button,
    .primary-button,
    .ghost-button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }

    .primary-button {
      border-color: rgba(112, 214, 255, 0.46);
      background: linear-gradient(135deg, rgba(112, 214, 255, 0.28), rgba(255, 207, 90, 0.18));
      font-weight: 700;
    }

    :where(.primary-button, .ghost-button, .icon-button):disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .ghost-button:hover,
    .icon-button:hover,
    .primary-button:hover {
      background-color: rgba(255, 255, 255, 0.15);
    }

    .content {
      border-radius: 8px;
      padding: 20px;
      min-width: 0;
    }

    .toolbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 18px;
    }

    .toolbar > div:first-child {
      min-width: 0;
    }

    .toolbar h2 {
      font-size: clamp(1.6rem, 4vw, 3.4rem);
      line-height: 0.95;
      max-width: 760px;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      flex: 0 0 auto;
      max-width: 100%;
      margin-left: auto;
    }

    .icon-button {
      width: 40px;
      padding: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }

    .app-card {
      min-height: 320px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      color: var(--text);
      background: var(--panel-strong);
      display: grid;
      grid-template-rows: 154px 1fr;
      cursor: pointer;
      text-align: left;
      padding: 0;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      position: relative;
    }

    .card-select {
      position: absolute;
      inset: 0;
      z-index: 1;
      border: 0;
      border-radius: inherit;
      padding: 0;
      background: transparent;
      cursor: pointer;
    }

    .card-select:focus-visible {
      outline-offset: -4px;
    }

    .app-card:hover,
    .app-card.active {
      transform: translateY(-3px);
      border-color: color-mix(in srgb, var(--accent) 70%, white 10%);
      background: rgba(34, 39, 46, 0.94);
    }

    .app-image {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.42)),
        var(--card-image);
      background-position: center;
      background-size: cover;
      transition: background-image 220ms ease;
    }

    .app-topbar {
      position: absolute;
      inset: 10px 10px auto 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      pointer-events: none;
    }

    .app-icon {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--accent-2);
      background: rgba(6, 9, 12, 0.82);
      font-weight: 900;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(14px);
    }

    .app-icon svg {
      width: 26px;
      height: 26px;
      display: block;
    }

    .media-dots {
      position: absolute;
      left: 10px;
      bottom: 10px;
      z-index: 2;
      display: flex;
      gap: 6px;
      padding: 5px 7px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.56);
      backdrop-filter: blur(14px);
    }

    .media-dot {
      width: 8px;
      height: 8px;
      border: 0;
      border-radius: 50%;
      padding: 0;
      background: rgba(255, 255, 255, 0.38);
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease;
    }

    .media-dot:hover,
    .media-dot:focus-visible {
      transform: scale(1.25);
    }

    .media-dot.active {
      background: var(--accent-2);
    }

    .status-pill {
      min-height: 28px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      padding: 4px 9px;
      color: var(--text);
      background: rgba(0, 0, 0, 0.54);
      font-size: 0.74rem;
      backdrop-filter: blur(14px);
    }

    .status-pill.online {
      color: #bbf7d0;
      border-color: rgba(74, 222, 128, 0.46);
    }

    .status-pill.offline {
      color: #fecdd3;
      border-color: rgba(251, 113, 133, 0.48);
    }

    .status-pill.local {
      color: var(--muted);
    }

    .card-actions {
      position: absolute;
      right: 10px;
      bottom: 10px;
      display: flex;
      gap: 6px;
      z-index: 2;
    }

    .mini-action {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      color: var(--text);
      background: rgba(0, 0, 0, 0.54);
      display: grid;
      place-items: center;
      cursor: pointer;
      backdrop-filter: blur(14px);
    }

    .mini-action.active {
      color: #111;
      background: var(--accent-2);
    }

    .app-body {
      padding: 14px;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .tag {
      width: fit-content;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 9px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.05);
      font-size: 0.77rem;
      overflow-wrap: anywhere;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pitch {
      color: var(--text);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .app-card h3 {
      font-size: 1.08rem;
      line-height: 1.15;
    }

    .app-card p {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .details {
      padding: 18px;
    }

    .hero-preview {
      aspect-ratio: 16 / 10;
      border-radius: 8px;
      border: 1px solid var(--line);
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(0, 0, 0, 0.06), rgba(0, 0, 0, 0.42)),
        var(--detail-image);
      background-position: center;
      background-size: cover;
      margin-bottom: 14px;
      transition: background-image 220ms ease;
    }

    .detail-media-controls {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      pointer-events: none;
    }

    .gallery-arrow {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      color: var(--text);
      background: rgba(0, 0, 0, 0.58);
      display: grid;
      place-items: center;
      cursor: pointer;
      pointer-events: auto;
      backdrop-filter: blur(14px);
    }

    .detail-media-dots {
      position: absolute;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      padding: 6px 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.58);
      pointer-events: auto;
      backdrop-filter: blur(14px);
    }

    .details h2 {
      font-size: 1.45rem;
      margin-bottom: 8px;
    }

    .details p {
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 14px;
    }

    .meta-list {
      display: grid;
      gap: 9px;
      margin: 16px 0;
    }

    .meta-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
      padding-bottom: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .meta-item strong {
      color: var(--text);
      font-weight: 600;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .details-actions {
      display: grid;
      grid-template-columns: 1fr 44px;
      gap: 8px;
    }

    body.admin-mode .details-actions {
      grid-template-columns: 1fr 44px 44px 44px;
    }

    .showcase {
      width: min(1040px, calc(100% - 24px));
    }

    .showcase-body {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(260px, 0.65fr);
      gap: 18px;
      padding: 16px;
    }

    .showcase-image {
      min-height: 420px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.28)),
        var(--showcase-image);
      background-position: center;
      background-size: cover;
    }

    .showcase-copy {
      align-self: center;
      display: grid;
      gap: 14px;
    }

    .admin-only {
      display: none;
    }

    body.admin-mode .admin-only {
      display: inline-flex;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 36px;
      color: var(--muted);
      text-align: center;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    dialog {
      width: min(620px, calc(100% - 24px));
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: #171b20;
      box-shadow: var(--shadow);
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(6px);
    }

    .modal-head,
    .modal-foot {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
    }

    .modal-foot {
      border-top: 1px solid var(--line);
      border-bottom: 0;
      justify-content: flex-end;
    }

    .form {
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.wide {
      grid-column: 1 / -1;
    }

    .field label {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .field input,
    .field select {
      height: 40px;
      padding: 0 10px;
    }

    .field textarea {
      min-height: 92px;
      resize: vertical;
      padding: 10px;
    }

    @media (max-width: 1320px) {
      .shell {
        grid-template-columns: 240px minmax(0, 1fr);
      }

      .details {
        grid-column: 1 / -1;
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 760px) {
      .shell {
        width: min(100% - 20px, 720px);
        grid-template-columns: 1fr;
        padding: 10px 0;
      }

      .sidebar {
        position: static;
        max-height: none;
      }

      .category-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .category-button {
        padding-inline: 9px;
      }

      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar-actions {
        display: grid;
        grid-template-columns: 40px minmax(0, 1fr);
        width: 100%;
      }

      .toolbar-actions .ghost-button {
        width: 100%;
      }

      #showcaseButton {
        grid-column: 1 / -1;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .tag-list {
        flex-wrap: nowrap;
        overflow-x: auto;
        padding-bottom: 6px;
        scrollbar-width: thin;
      }

      .tag-filter {
        flex: 0 0 auto;
      }

      .form {
        grid-template-columns: 1fr;
      }

      .showcase-body {
        grid-template-columns: 1fr;
      }

      .showcase-image {
        min-height: 260px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <div class="stage" id="stage"></div>

  <main class="shell">
    <aside class="sidebar" aria-label="Navigation du launcher">
      <div class="brand">
        <div class="brand-mark">L</div>
        <div>
          <h1>Mon Launcher</h1>
          <p class="subtitle">Applications, jeux et outils</p>
        </div>
      </div>

      <label class="search" aria-label="Rechercher une application">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="m21 21-4.35-4.35m1.35-5.15a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="searchInput" type="search" placeholder="Rechercher">
      </label>

      <div class="nav-title">Types</div>
      <nav class="category-list" id="categoryList"></nav>

      <div class="nav-title">Tags</div>
      <div class="tag-list" id="tagList"></div>

      <div class="quick-actions">
        <button class="primary-button admin-only" id="addButton" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Ajouter une appli
        </button>
        <button class="ghost-button" id="adminButton" type="button" aria-pressed="false">Mode édition</button>
        <button class="ghost-button admin-only" id="resetButton" type="button">Restaurer le catalogue</button>
      </div>
    </aside>

    <section class="content">
      <div class="toolbar">
        <div>
          <p class="subtitle" id="resultCount" role="status" aria-live="polite"></p>
          <h2 id="viewTitle">Toutes tes applications</h2>
        </div>
        <div class="toolbar-actions">
          <button class="icon-button" id="sortButton" type="button" title="Trier par nom" aria-label="Trier par nom">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 7h12M4 12h9M4 17h15M18 5v14m0 0 3-3m-3 3-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="ghost-button" id="randomButton" type="button">Ambiance au hasard</button>
          <button class="ghost-button" id="showcaseButton" type="button">Mode vitrine</button>
        </div>
      </div>
      <div class="grid" id="appGrid"></div>
    </section>

    <aside class="details" id="details" aria-label="Détails de l'application"></aside>
  </main>

  <dialog id="appDialog" aria-labelledby="appDialogTitle">
    <form id="appForm">
      <div class="modal-head">
        <h2 id="appDialogTitle">Ajouter une application</h2>
        <button class="icon-button" id="closeAppDialogButton" type="button" aria-label="Fermer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>

        description: "Une seconde interprétation de Hive Ascension qui suit tout le cycle biologique, de l'Ovomorphe à la Reine, avant de basculer vers un RTS organique.",
        pitch: "Change de vision, infiltre la station et développe une ruche capable de commander par phéromones.",
        tags: ["Évolution", "RTS organique", "Trois visions", "Science-fiction"],
        icon: "HC",
        link: "https://eager-curie.vercel.app",
        status: "Vercel",
        accent: "#49f58a",
        presentation: "assets/presentations/hive-ascension-cycle.png",
        image: "assets/previews/hive-ascension-cycle.png"
      },
      {
        id: "miyabi-rhythm",
        name: "Miyabi Rhythm",
        category: "Jeux",
        description: "Un jeu de rythme japonais jouable au koto, taiko, shamisen, biwa ou kokyu, avec morceaux traditionnels, import de charts et éditeur intégré.",
        pitch: "Choisis ton instrument, suis les pistes musicales et transforme le dojo au rythme de ta performance.",
        tags: ["Rythme", "Japon", "Instruments", "Éditeur"],
        icon: "MR",
        link: "https://miyabi-rhythm.vercel.app",
        status: "Vercel",
        accent: "#e14b57",
        presentation: "assets/presentations/miyabi-rhythm.png",
        image: "assets/previews/miyabi-rhythm.png"
      },
      {
        id: "kc-holographics",
        name: "Yu-Gi-Oh! 2.5D Duel Simulator",
        category: "Jeux",
        description: "Un simulateur de duel holographique 2.5D avec decks prédéfinis, règles TCG strictes ou mode anime, plusieurs niveaux d'IA et dos de cartes personnalisables.",
        pitch: "Prépare ton deck, invoque tes cartes sur une arène holographique et affronte l'IA dans le navigateur.",
        tags: ["Cartes", "Duel", "Hologrammes", "Stratégie"],
        icon: "KC",
        link: "https://yugioh-25d-holograms.vercel.app",
        status: "Vercel",
        accent: "#20d9e9",
        presentation: "assets/presentations/kc-holographics.png",
        image: "assets/previews/kc-holographics.png"
      }
    ];

    const categoryColors = {
      "Tous": "#70d6ff",
      "Favoris": "#ffcf5a",
      "Jeux": "#ff6b6b",
      "Applications": "#70d6ff",
      "Création": "#ffcf5a",
      "Simulation": "#9b7cff",
      "Travail": "#8be28b",
      "Autre": "#d0a2ff"
    };

    const storeKey = "personal-launcher-apps-v7";
    const favoriteKey = "personal-launcher-favorites-v1";
    const removedStarterKey = "personal-launcher-removed-starters-v1";
    const allowedLaunchProtocols = new Set(["https:", "http:", "steam:", "file:"]);
    const appIconIds = new Set(starterApps.map((app) => app.id));
    const stage = document.getElementById("stage");
    const grid = document.getElementById("appGrid");
    const details = document.getElementById("details");
    const categoryList = document.getElementById("categoryList");
    const tagList = document.getElementById("tagList");
    const resultCount = document.getElementById("resultCount");
    const viewTitle = document.getElementById("viewTitle");
    const searchInput = document.getElementById("searchInput");
    const appDialog = document.getElementById("appDialog");
    const appForm = document.getElementById("appForm");
    const showcaseDialog = document.getElementById("showcaseDialog");
    const showcaseBody = document.getElementById("showcaseBody");
    const showcaseTitle = document.getElementById("showcaseTitle");

    const removedStarterIds = loadRemovedStarterIds();
    let apps = loadApps();
    let favorites = loadFavorites();
    let onlineStatus = {};
    let activeCategory = "Tous";
    let activeTag = "Tous";
    let selectedId = apps[0]?.id;
    let sortAscending = true;
    let adminMode = false;
    let editingId = null;
    let socialPanelController = null;
    const mediaViewById = new Map();

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function sanitizeAccent(value) {
      const color = String(value || "").trim();
      return /^#[0-9a-f]{6}$/i.test(color) ? color : "#70d6ff";
    }

    function sanitizeLaunchUrl(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";

      try {
        const url = new URL(raw, document.baseURI);
        return allowedLaunchProtocols.has(url.protocol) ? url.href : "";
      } catch (error) {
        return "";
      }
    }

    function sanitizeImageUrl(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";

      try {
        const url = new URL(raw, document.baseURI);
        const isLocalFile = location.protocol === "file:" && url.protocol === "file:";
        return ["https:", "http:"].includes(url.protocol) || isLocalFile ? url.href : "";
      } catch (error) {
        return "";
      }
    }

    function normalizeApp(app = {}) {
      const source = app && typeof app === "object" ? app : {};
      const fallback = starterApps.find((item) => item.id === source.id) || {};
      const rawTags = Array.isArray(source.tags) ? source.tags : String(source.tags || "").split(",");
      const tags = [...new Set(rawTags.map((tag) => String(tag).trim()).filter(Boolean))].slice(0, 10);
      const rawGallery = Array.isArray(source.gallery) ? source.gallery : (Array.isArray(fallback.gallery) ? fallback.gallery : []);
      const gallery = [...new Set(rawGallery.map(sanitizeImageUrl).filter(Boolean))].slice(0, 10);
      const name = String(source.name || fallback.name || "Application").trim().slice(0, 80);
      return {
        ...fallback,
        ...source,
        id: String(source.id || fallback.id || `app-${Date.now()}`),
        name,
        category: String(source.category || fallback.category || "Autre").trim().slice(0, 40),
        description: String(source.description || fallback.description || "").trim().slice(0, 600),
        pitch: String(source.pitch || fallback.pitch || source.description || fallback.description || "").trim().slice(0, 280),
        tags,
        icon: String(source.icon || fallback.icon || initials(name)).trim().slice(0, 5),
        link: sanitizeLaunchUrl(source.link || fallback.link),
        presentation: sanitizeImageUrl(source.presentation || fallback.presentation || source.image || fallback.image),
        image: sanitizeImageUrl(source.image || fallback.image),
        gallery,
        accent: sanitizeAccent(source.accent || fallback.accent),
        status: String(source.status || fallback.status || "").trim().slice(0, 40)
      };
    }

    function safeReadArray(key) {
      try {
        const saved = localStorage.getItem(key);
        if (saved === null) return null;
        const parsed = JSON.parse(saved);
        return Array.isArray(parsed) ? parsed : null;
      } catch (error) {
        console.warn(`Stockage ignoré pour ${key}:`, error);
        return null;
      }
    }

    function safeWrite(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
        return true;
      } catch (error) {
        console.warn(`Impossible d'enregistrer ${key}:`, error);
        return false;
      }
    }

    function loadRemovedStarterIds() {
      return new Set((safeReadArray(removedStarterKey) || []).map(String));
    }

    function loadApps() {
      const saved = safeReadArray(storeKey);
      if (!saved) return starterApps.map(normalizeApp);

      const loaded = saved.filter((app) => app && typeof app === "object").map(normalizeApp);
      const knownIds = new Set(loaded.map((app) => app.id));
      starterApps.forEach((starter) => {
        if (!knownIds.has(starter.id) && !removedStarterIds.has(starter.id)) {
          loaded.push(normalizeApp(starter));
        }
      });
      return loaded;
    }

    function loadFavorites() {
      const appIds = new Set(apps.map((app) => app.id));
      return new Set((safeReadArray(favoriteKey) || []).map(String).filter((id) => appIds.has(id)));
    }

    function saveApps() {
      safeWrite(storeKey, apps);
    }

    function saveFavorites() {
      safeWrite(favoriteKey, [...favorites]);
    }

    function saveRemovedStarterIds() {
      safeWrite(removedStarterKey, [...removedStarterIds]);
    }

    function initials(name) {
      return String(name)
        .split(/\s+/)
        .slice(0, 2)
        .map((word) => word[0]?.toUpperCase() || "")
        .join("") || "AP";
    }

    function mediaImages(app) {
      const images = [
        sanitizeImageUrl(app.presentation),
        sanitizeImageUrl(app.image),
        ...(Array.isArray(app.gallery) ? app.gallery.map(sanitizeImageUrl) : [])
      ].filter(Boolean);
      return images.filter((image, index) => images.indexOf(image) === index);
    }

    function mediaLabel(index) {
      if (index === 0) return "Illustration";
      if (index === 1) return "Capture d'écran";
      return `Vue ${index}`;
    }

    function currentMediaIndex(app) {
      const images = mediaImages(app);
      return Math.min(mediaViewById.get(app.id) || 0, Math.max(images.length - 1, 0));
    }

    function cssImage(app, index = currentMediaIndex(app)) {
      const image = mediaImages(app)[index];
      if (image) {
        return `url(${JSON.stringify(image)})`;
      }

      return `linear-gradient(135deg, ${sanitizeAccent(app.accent)}, #232a31 52%, #101214)`;
    }

    function appIconMarkup(app) {
      if (!appIconIds.has(app.id)) return escapeHtml(app.icon);
      const href = `assets/app-icons.svg#icon-${app.id}`;
      return `<svg aria-hidden="true" focusable="false"><use href="${escapeHtml(href)}"></use></svg>`;
    }

    function statusLabel(app) {
      const state = onlineStatus[app.id];
      if (state === "online") return "Joignable";
      if (state === "offline") return "Injoignable";
      if (!app.link) return "Sans lien";
      if (!/^https?:/i.test(app.link)) return "Lien local";
      return "Vérification...";
    }

    function statusClass(app) {
      if (onlineStatus[app.id]) return onlineStatus[app.id];
      return /^https?:/i.test(app.link) ? "checking" : "local";
    }

    function normalizeSearch(value) {
      return String(value || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    function allTags() {
      return [...new Set(apps.flatMap((app) => app.tags || []))].sort((a, b) => a.localeCompare(b));
    }

    function filteredApps() {
      const query = normalizeSearch(searchInput.value.trim());
      return apps
        .filter((app) => activeCategory === "Tous" || (activeCategory === "Favoris" ? favorites.has(app.id) : app.category === activeCategory))
        .filter((app) => activeTag === "Tous" || (app.tags || []).includes(activeTag))
        .filter((app) => {
          const haystack = normalizeSearch(`${app.name} ${app.category} ${app.description} ${app.pitch} ${app.status} ${(app.tags || []).join(" ")}`);
          return haystack.includes(query);
        })
        .sort((a, b) => {
          const favDelta = Number(favorites.has(b.id)) - Number(favorites.has(a.id));
          if (favDelta) return favDelta;
          return sortAscending ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
        });
    }

    function renderCategories() {
      const counts = apps.reduce((acc, app) => {
        acc[app.category] = (acc[app.category] || 0) + 1;
        return acc;
      }, { Tous: apps.length, Favoris: favorites.size });

      const categories = ["Tous", "Favoris", ...Object.keys(counts).filter((item) => !["Tous", "Favoris"].includes(item)).sort()];
      categoryList.innerHTML = categories.map((category) => `
        <button class="category-button ${category === activeCategory ? "active" : ""}" type="button" data-category="${escapeHtml(category)}" aria-pressed="${category === activeCategory}" style="--category-color: ${categoryColors[category] || categoryColors.Autre}">
          <span class="category-meta">
            <span class="category-dot"></span>
            <span>${escapeHtml(category)}</span>
          </span>
          <span class="category-count">${counts[category] || 0}</span>
        </button>
      `).join("");
    }

    function renderTags() {
      const tags = ["Tous", ...allTags()];
      tagList.innerHTML = tags.map((tag) => `
        <button class="tag-filter ${tag === activeTag ? "active" : ""}" type="button" data-tag="${escapeHtml(tag)}" aria-pressed="${tag === activeTag}">${escapeHtml(tag)}</button>
      `).join("");
    }

    function renderGrid() {
      const visibleApps = filteredApps();
      resultCount.textContent = `${visibleApps.length} application${visibleApps.length > 1 ? "s" : ""}`;
      viewTitle.textContent = activeCategory === "Tous" ? "Toutes tes applications" : activeCategory;

      if (!visibleApps.length) {
        grid.innerHTML = `<div class="empty">Aucune application ne correspond à cette recherche.</div>`;
        renderDetails(null);
        return;
      }

      if (!visibleApps.some((app) => app.id === selectedId)) {
        selectedId = visibleApps[0].id;
      }

      grid.innerHTML = visibleApps.map((app) => {
        const images = mediaImages(app);
        const activeMediaIndex = currentMediaIndex(app);
        return `
          <article class="app-card ${app.id === selectedId ? "active" : ""}" data-id="${escapeHtml(app.id)}">
            <button class="card-select" type="button" data-action="select" data-id="${escapeHtml(app.id)}" aria-pressed="${app.id === selectedId}" aria-label="Afficher les détails de ${escapeHtml(app.name)}"></button>
            <div class="app-image">
              <div class="app-topbar">
                <span class="app-icon">${appIconMarkup(app)}</span>
                <span class="status-pill ${statusClass(app)}">${statusLabel(app)}</span>
              </div>
              ${images.length > 1 ? `
                <div class="media-dots" role="group" aria-label="Visuels de ${escapeHtml(app.name)}">
                  ${images.map((image, index) => `
                    <button
                      class="media-dot ${index === activeMediaIndex ? "active" : ""}"
                      type="button"
                      data-action="media"
                      data-id="${escapeHtml(app.id)}"
                      data-index="${index}"
                      title="${escapeHtml(mediaLabel(index))}"
                      aria-label="Voir ${escapeHtml(mediaLabel(index).toLowerCase())} de ${escapeHtml(app.name)}"
                      aria-pressed="${index === activeMediaIndex}"
                    ></button>
                  `).join("")}
                </div>
              ` : ""}
              <div class="card-actions">
                <button class="mini-action favorite-button ${favorites.has(app.id) ? "active" : ""}" type="button" data-action="favorite" data-id="${escapeHtml(app.id)}" title="Favori" aria-label="${favorites.has(app.id) ? "Retirer" : "Ajouter"} ${escapeHtml(app.name)} ${favorites.has(app.id) ? "des" : "aux"} favoris" aria-pressed="${favorites.has(app.id)}">
                  <svg width="17" height="17" viewBox="0 0 24 24" fill="${favorites.has(app.id) ? "currentColor" : "none"}" aria-hidden="true">
                    <path d="m12 3 2.9 5.88 6.49.94-4.7 4.58 1.11 6.46L12 17.81l-5.8 3.05 1.11-6.46-4.7-4.58 6.49-.94L12 3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                  </svg>
                </button>
                <button class="mini-action admin-only" type="button" data-action="edit" data-id="${escapeHtml(app.id)}" title="Modifier" aria-label="Modifier ${escapeHtml(app.name)}">
                  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M4 20h4L18.5 9.5a2.12 2.12 0 0 0-3-3L5 17v3Zm12-15 3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
              </div>
            </div>
            <div class="app-body">
              <div class="tag-row">
                <span class="tag">${escapeHtml(app.category)}</span>
                ${(app.tags || []).slice(0, 2).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
              </div>
              <h3>${escapeHtml(app.name)}</h3>
              <p class="pitch">${escapeHtml(app.pitch)}</p>
              <p>${escapeHtml(app.description)}</p>
            </div>
          </article>
        `;
      }).join("");

      grid.querySelectorAll(".app-card").forEach((card, index) => {
        const app = visibleApps[index];
        card.style.setProperty("--accent", sanitizeAccent(app.accent));
        card.style.setProperty("--accent-2", sanitizeAccent(app.accent));
        card.style.setProperty("--card-image", cssImage(app));
      });

      renderDetails(apps.find((app) => app.id === selectedId));
    }

    function renderDetails(app) {
      if (socialPanelController) {
        socialPanelController.destroy();
        socialPanelController = null;
      }

      if (!app) {
        details.innerHTML = `<div class="empty">Sélectionne ou ajoute une application.</div>`;
        return;
      }

      const images = mediaImages(app);
      const activeMediaIndex = currentMediaIndex(app);
      const previousMediaIndex = (activeMediaIndex - 1 + images.length) % images.length;
      const nextMediaIndex = (activeMediaIndex + 1) % images.length;

      document.documentElement.style.setProperty("--active-image", cssImage(app, 0));
      document.documentElement.style.setProperty("--accent", sanitizeAccent(app.accent));
      details.style.setProperty("--detail-image", cssImage(app, activeMediaIndex));
      details.setAttribute("aria-label", `Détails de ${app.name}`);

      const openControl = app.link
        ? `<a class="primary-button" href="${escapeHtml(app.link)}" target="_blank" rel="noopener noreferrer" data-launch-app="${escapeHtml(app.id)}">Ouvrir</a>`
        : `<button class="primary-button" type="button" disabled>Sans lien</button>`;

      details.innerHTML = `
        <div class="hero-preview" role="img" aria-label="${escapeHtml(mediaLabel(activeMediaIndex))} de ${escapeHtml(app.name)}">
          ${images.length > 1 ? `
            <div class="detail-media-controls">
              <button class="gallery-arrow" type="button" data-detail-media="${previousMediaIndex}" title="Image précédente" aria-label="Voir l'image précédente">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="m15 18-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <button class="gallery-arrow" type="button" data-detail-media="${nextMediaIndex}" title="Image suivante" aria-label="Voir l'image suivante">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="m9 18 6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <div class="detail-media-dots" role="group" aria-label="Visuels de ${escapeHtml(app.name)}">
                ${images.map((image, index) => `
                  <button
                    class="media-dot ${index === activeMediaIndex ? "active" : ""}"
                    type="button"
                    data-detail-media="${index}"
                    title="${escapeHtml(mediaLabel(index))}"
                    aria-label="Voir ${escapeHtml(mediaLabel(index).toLowerCase())}"
                    aria-pressed="${index === activeMediaIndex}"
                  ></button>
                `).join("")}
              </div>
            </div>
          ` : ""}
        </div>
        <div class="tag-row">
          <span class="tag">${escapeHtml(app.category)}</span>
          ${(app.tags || []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
        </div>
        <h2>${escapeHtml(app.name)}</h2>
        <p class="pitch">${escapeHtml(app.pitch)}</p>
        <p>${escapeHtml(app.description)}</p>
        <div class="meta-list">
          <div class="meta-item"><span>Statut</span><strong>${statusLabel(app)}</strong></div>
          <div class="meta-item"><span>Plateforme</span><strong>${escapeHtml(app.status || "Non renseigné")}</strong></div>
          <div class="meta-item"><span>Lien</span><strong>${escapeHtml(app.link || "A configurer")}</strong></div>
        </div>
        <div class="details-actions">
          ${openControl}
          <button class="icon-button" type="button" id="detailFavoriteButton" title="Favori" aria-label="${favorites.has(app.id) ? "Retirer des favoris" : "Ajouter aux favoris"}" aria-pressed="${favorites.has(app.id)}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="${favorites.has(app.id) ? "currentColor" : "none"}" aria-hidden="true">
              <path d="m12 3 2.9 5.88 6.49.94-4.7 4.58 1.11 6.46L12 17.81l-5.8 3.05 1.11-6.46-4.7-4.58 6.49-.94L12 3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="icon-button admin-only" type="button" id="editButton" title="Modifier" aria-label="Modifier">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 20h4L18.5 9.5a2.12 2.12 0 0 0-3-3L5 17v3Zm12-15 3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="icon-button admin-only" type="button" id="deleteButton" title="Supprimer" aria-label="Supprimer">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 7h16M10 11v6M14 11v6M6 7l1 14h10l1-14M9 7V4h6v3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="social-panel-mount" data-social-panel></div>
      `;

      const socialMount = details.querySelector("[data-social-panel]");
      if (socialMount && window.LauncherSocial) {
        try {
          socialPanelController = window.LauncherSocial.mountPanel(socialMount, app, { adminMode });
        } catch (error) {
          socialMount.innerHTML = `<p class="social-panel-error" role="status">Activité indisponible.</p>`;
          console.warn("Panneau social indisponible:", error);
        }
      }
    }

    function renderShowcase(app = apps.find((item) => item.id === selectedId)) {
      if (!app) return;
      showcaseTitle.textContent = app.name;
      showcaseBody.style.setProperty("--showcase-image", cssImage(app, 0));
      const openControl = app.link
        ? `<a class="primary-button" href="${escapeHtml(app.link)}" target="_blank" rel="noopener noreferrer" data-launch-app="${escapeHtml(app.id)}">Ouvrir</a>`
        : `<button class="primary-button" type="button" disabled>Sans lien</button>`;
      showcaseBody.innerHTML = `
        <div class="showcase-image"></div>
        <div class="showcase-copy">
          <div class="app-icon">${appIconMarkup(app)}</div>
          <div class="tag-row">
            <span class="tag">${escapeHtml(app.category)}</span>
            ${(app.tags || []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
          </div>
          <h2>${escapeHtml(app.name)}</h2>
          <p class="pitch">${escapeHtml(app.pitch)}</p>
          <p>${escapeHtml(app.description)}</p>
          ${openControl}
        </div>
      `;
      showcaseDialog.showModal();
    }

    function openEditor(app = null) {
      editingId = app?.id || null;
      appForm.reset();
      document.querySelector("#appDialog .modal-head h2").textContent = app ? "Modifier une application" : "Ajouter une application";
      document.getElementById("submitAppButton").textContent = app ? "Enregistrer" : "Ajouter";
      document.getElementById("nameField").value = app?.name || "";
      document.getElementById("categoryField").value = app?.category || "Autre";
      document.getElementById("descriptionField").value = app?.description || "";
      document.getElementById("pitchField").value = app?.pitch || "";
      document.getElementById("linkField").value = app?.link || "";
      document.getElementById("presentationField").value = app?.presentation || "";
      document.getElementById("imageField").value = app?.image || "";
      document.getElementById("iconField").value = app?.icon || "";
      document.getElementById("tagsField").value = (app?.tags || []).join(", ");
      document.getElementById("accentField").value = app?.accent || "#70d6ff";
      document.getElementById("statusField").value = app?.status || "";
      ["nameField", "descriptionField", "linkField", "presentationField", "imageField"].forEach((id) => document.getElementById(id).setCustomValidity(""));
      appDialog.showModal();
    }

    function toggleFavorite(id) {
      if (favorites.has(id)) {
        favorites.delete(id);
      } else {
        favorites.add(id);
      }
      saveFavorites();
      render();
    }

    function render() {
      document.body.classList.toggle("admin-mode", adminMode);
      renderCategories();
      renderTags();
      renderGrid();
    }

    function selectApp(id, revealDetails = false) {
      if (!apps.some((app) => app.id === id)) return;
      selectedId = id;
      renderGrid();
      if (revealDetails && window.matchMedia("(max-width: 1320px)").matches) {
        requestAnimationFrame(() => details.scrollIntoView({ behavior: "smooth", block: "start" }));
      }
    }

    async function loadAppGallery() {
      try {
        const response = await fetch("assets/app-gallery.json", { cache: "no-cache" });
        if (!response.ok) return;
        const data = await response.json();
        const galleryMap = data.galleries || data.apps || data;
        if (!galleryMap || typeof galleryMap !== "object") return;

        apps = apps.map((app) => {
          const entry = galleryMap[app.id];
          const rawImages = Array.isArray(entry) ? entry : entry?.images;
          if (!Array.isArray(rawImages)) return app;
          const gallery = [...new Set(rawImages.map(sanitizeImageUrl).filter(Boolean))].slice(0, 10);
          return { ...app, gallery };
        });
        renderGrid();
      } catch (error) {
        console.warn("Galeries supplémentaires indisponibles:", error);
      }
    }

    async function checkOnlineStatus() {
      const webApps = apps.filter((app) => /^https?:/i.test(app.link));
      apps.forEach((app) => {
        onlineStatus[app.id] = /^https?:/i.test(app.link) ? "checking" : "local";
      });
      renderGrid();

      await Promise.allSettled(webApps.map(async (app) => {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 6000);
        try {
          await fetch(app.link, { mode: "no-cors", cache: "no-store", signal: controller.signal });
          onlineStatus[app.id] = "online";
        } catch (error) {
          onlineStatus[app.id] = "offline";
        } finally {
          clearTimeout(timeout);
        }
      }));
      renderGrid();
    }

    categoryList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-category]");
      if (!button) return;
      activeCategory = button.dataset.category;
      render();
    });

    tagList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-tag]");
      if (!button) return;
      activeTag = button.dataset.tag;
      render();
    });

    grid.addEventListener("mouseover", (event) => {
      const card = event.target.closest(".app-card");
      if (!card) return;
      const app = apps.find((item) => item.id === card.dataset.id);
      if (app) {
        document.documentElement.style.setProperty("--active-image", cssImage(app));
      }
    });

    grid.addEventListener("focusin", (event) => {
      const card = event.target.closest(".app-card");
      if (!card) return;
      const app = apps.find((item) => item.id === card.dataset.id);
      if (app) document.documentElement.style.setProperty("--active-image", cssImage(app));
    });

    grid.addEventListener("mouseleave", () => {
      const selectedApp = apps.find((app) => app.id === selectedId);
      if (selectedApp) document.documentElement.style.setProperty("--active-image", cssImage(selectedApp));
    });

    grid.addEventListener("click", (event) => {
      const actionButton = event.target.closest("[data-action]");
      if (actionButton) {
        event.stopPropagation();
        const app = apps.find((item) => item.id === actionButton.dataset.id);
        if (!app) return;
        if (actionButton.dataset.action === "media") {
          mediaViewById.set(app.id, Number(actionButton.dataset.index) || 0);
          renderGrid();
          return;
        }
        if (actionButton.dataset.action === "favorite") toggleFavorite(app.id);
        if (actionButton.dataset.action === "edit") openEditor(app);
        if (actionButton.dataset.action === "select") selectApp(app.id, true);
        return;
      }
    });

    grid.addEventListener("keydown", (event) => {
      const selectButton = event.target.closest('[data-action="select"]');
      if (!selectButton || !["Enter", " "].includes(event.key)) return;
      event.preventDefault();
      selectApp(selectButton.dataset.id, true);
    });

    details.addEventListener("click", (event) => {
      const selectedApp = apps.find((app) => app.id === selectedId);
      const mediaButton = event.target.closest("[data-detail-media]");
      if (mediaButton && selectedApp) {
        mediaViewById.set(selectedApp.id, Number(mediaButton.dataset.detailMedia) || 0);
        renderGrid();
        return;
      }
      if (event.target.closest("#detailFavoriteButton") && selectedApp) {
        toggleFavorite(selectedApp.id);
        return;
      }
      if (event.target.closest("#editButton") && selectedApp) {
        openEditor(selectedApp);
        return;
      }
      const deleteButton = event.target.closest("#deleteButton");
      if (!deleteButton || !selectedId) return;
      const deletedApp = apps.find((app) => app.id === selectedId);
      if (!deletedApp || !window.confirm(`Supprimer ${deletedApp.name} du launcher ?`)) return;
      const deletedId = selectedId;
      apps = apps.filter((app) => app.id !== selectedId);
      favorites.delete(deletedId);
      delete onlineStatus[deletedId];
      if (starterApps.some((app) => app.id === deletedId)) {
        removedStarterIds.add(deletedId);
        saveRemovedStarterIds();
      }
      selectedId = apps[0]?.id;
      saveApps();
      saveFavorites();
      render();
    });

    document.addEventListener("click", (event) => {
      const launchLink = event.target.closest("[data-launch-app]");
      if (!launchLink || !window.LauncherSocial) return;
      window.LauncherSocial.recordVisit(launchLink.dataset.launchApp).catch(() => {});
    });

    searchInput.addEventListener("input", renderGrid);

    const sortButton = document.getElementById("sortButton");
    sortButton.addEventListener("click", () => {
      sortAscending = !sortAscending;
      const label = `Trier par nom, ordre ${sortAscending ? "croissant" : "décroissant"}`;
      sortButton.title = label;
      sortButton.setAttribute("aria-label", label);
      renderGrid();
    });

    document.getElementById("randomButton").addEventListener("click", () => {
      const visibleApps = filteredApps();
      const randomApp = visibleApps[Math.floor(Math.random() * visibleApps.length)];
      if (!randomApp) return;
      selectApp(randomApp.id, true);
    });

    document.getElementById("showcaseButton").addEventListener("click", () => renderShowcase());
    document.getElementById("closeShowcaseButton").addEventListener("click", () => showcaseDialog.close());
    document.getElementById("closeAppDialogButton").addEventListener("click", () => appDialog.close());
    document.getElementById("cancelAppButton").addEventListener("click", () => appDialog.close());

    document.getElementById("addButton").addEventListener("click", () => openEditor());

    document.getElementById("adminButton").addEventListener("click", (event) => {
      adminMode = !adminMode;
      event.currentTarget.textContent = adminMode ? "Quitter l'édition" : "Mode édition";
      event.currentTarget.setAttribute("aria-pressed", String(adminMode));
      render();
    });

    document.getElementById("resetButton").addEventListener("click", () => {
      if (!window.confirm("Restaurer le catalogue d'origine ? Les ajouts, modifications et favoris locaux seront supprimés.")) return;
      apps = starterApps.map(normalizeApp);
      favorites.clear();
      removedStarterIds.clear();
      onlineStatus = {};
      selectedId = apps[0]?.id;
      activeCategory = "Tous";
      activeTag = "Tous";
      saveApps();
      saveFavorites();
      saveRemovedStarterIds();
      render();
      checkOnlineStatus();
    });

    appForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const formData = new FormData(appForm);
      const name = String(formData.get("name")).trim();
      const description = String(formData.get("description")).trim();
      const rawLink = String(formData.get("link")).trim();
      const rawPresentation = String(formData.get("presentation")).trim();
      const rawImage = String(formData.get("image")).trim();
      const nameField = document.getElementById("nameField");
      const descriptionField = document.getElementById("descriptionField");
      const linkField = document.getElementById("linkField");
      const presentationField = document.getElementById("presentationField");
      const imageField = document.getElementById("imageField");

      nameField.setCustomValidity(name ? "" : "Saisis un nom.");
      descriptionField.setCustomValidity(description ? "" : "Saisis une description.");
      linkField.setCustomValidity(rawLink && !sanitizeLaunchUrl(rawLink) ? "Utilise un lien http, https, steam ou file valide." : "");
      presentationField.setCustomValidity(rawPresentation && !sanitizeImageUrl(rawPresentation) ? "Utilise une image http, https ou un chemin relatif valide." : "");
      imageField.setCustomValidity(rawImage && !sanitizeImageUrl(rawImage) ? "Utilise une image http, https ou un chemin relatif valide." : "");
      if (!appForm.checkValidity()) {
        appForm.reportValidity();
        return;
      }

      const slug = normalizeSearch(name).replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "application";
      const app = normalizeApp({
        id: editingId || `${Date.now()}-${slug}`,
        name,
        category: String(formData.get("category")).trim() || "Autre",
        description,
        pitch: String(formData.get("pitch")).trim(),
        link: rawLink,
        presentation: rawPresentation,
        image: rawImage,
        icon: String(formData.get("icon")).trim(),
        tags: String(formData.get("tags")).split(",").map((tag) => tag.trim()).filter(Boolean),
        accent: String(formData.get("accent")).trim() || "#70d6ff",
        status: String(formData.get("status")).trim()
      });

      apps = editingId ? apps.map((item) => item.id === editingId ? app : item) : [app, ...apps];
      selectedId = app.id;
      activeCategory = "Tous";
      activeTag = "Tous";
      editingId = null;
      saveApps();
      appDialog.close();
      render();
      checkOnlineStatus();
    });

    ["nameField", "descriptionField", "linkField", "presentationField", "imageField"].forEach((id) => {
      document.getElementById(id).addEventListener("input", (event) => event.currentTarget.setCustomValidity(""));
    });

    document.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "k") {
        event.preventDefault();
        searchInput.focus();
        searchInput.select();
      }
    });

    render();
    loadAppGallery();
    checkOnlineStatus();

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch((error) => console.warn("Service worker indisponible:", error)));
    }
  </script>
</body>
</html>
